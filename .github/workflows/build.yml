name: build

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '可选：手动指定版本号（例如 2.3.2），不填则自动取 tag 或 perfect_build.py 当前版本'
        required: false
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      PYTHON_VERSION: '3.10'
      PIP_NO_INPUT: '1'
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
      IS_MAIN: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSVC build environment (C compiler for Nuitka)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Verify C compiler
        shell: powershell
        run: |
          $cl = Get-Command cl.exe -ErrorAction SilentlyContinue
          if (-not $cl) {
            Write-Error "未找到 cl.exe（MSVC C 编译器），Nuitka 无法继续"
            exit 1
          }
          Write-Host "MSVC compiler found: $($cl.Source)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache Nuitka artifacts
        id: nuitka_cache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Main cache heartbeat (early exit)
        if: ${{ env.IS_MAIN == 'true' && steps.nuitka_cache.outputs.cache-hit == 'true' }}
        shell: powershell
        run: |
          Write-Host "Main cache heartbeat: cache hit, skip heavy build steps."

      - name: Install Inno Setup
        if: ${{ env.IS_TAG == 'true' || env.IS_MAIN != 'true' || steps.nuitka_cache.outputs.cache-hit != 'true' }}
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $compil32 = "C:\Program Files (x86)\Inno Setup 6\Compil32.exe"
          if ((-not (Test-Path $iscc)) -and (-not (Test-Path $compil32))) {
            Write-Error "Inno Setup 安装失败，未找到 ISCC.exe/Compil32.exe"
            exit 1
          }

      - name: Install Dependency Walker (for Nuitka)
        if: ${{ env.IS_TAG == 'true' || env.IS_MAIN != 'true' || steps.nuitka_cache.outputs.cache-hit != 'true' }}
        shell: powershell
        run: |
          choco install dependencywalker --no-progress -y
          $dependsPath = "C:\Program Files (x86)\Dependency Walker\depends.exe"
          if (Test-Path $dependsPath) {
            $dependsDir = Split-Path $dependsPath -Parent
            echo $dependsDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Dependency Walker installed: $dependsPath"
          } else {
            Write-Warning "Dependency Walker package installed but depends.exe not found in expected location. Nuitka auto-download fallback will be used."
          }

      - name: Install Python dependencies
        # 只要是正常的构建流程，都执行 pip install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Resolve version from tag/input
        id: version
        if: ${{ env.IS_TAG == 'true' || env.IS_MAIN != 'true' || steps.nuitka_cache.outputs.cache-hit != 'true' }}
        shell: powershell
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          $refName = "${{ github.ref_name }}"

          if ($inputVersion) {
            $version = $inputVersion
          } elseif ("${{ github.ref }}" -like "refs/tags/*") {
            $version = $refName -replace '^v', ''
          } else {
            $version = ""
          }

          if (-not $version) {
            $content = Get-Content "PerfectBuild/perfect_build.py" -Raw
            if ($content -match 'app_ver\s*=\s*"([^"]+)"') {
              $version = $Matches[1]
            } else {
              Write-Error "无法从 perfect_build.py 解析 app_ver"
              exit 1
            }
          }

          Write-Host "Build version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Update version in files
        if: ${{ env.IS_TAG == 'true' || env.IS_MAIN != 'true' || steps.nuitka_cache.outputs.cache-hit != 'true' }}
        shell: powershell
        env:
          TARGET_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $version = $env:TARGET_VERSION

          $perfectBuildPath = "PerfectBuild/perfect_build.py"
          $perfectBuildContent = Get-Content -Path $perfectBuildPath -Raw -Encoding UTF8
          $perfectBuildUpdated = [regex]::Replace(
            $perfectBuildContent,
            'app_ver\s*=\s*"[^"]+"',
            "app_ver = `"$version`"",
            1
          )
          Set-Content -Path $perfectBuildPath -Value $perfectBuildUpdated -Encoding UTF8

          $updateDataPath = "update_data.txt"
          $lines = @(Get-Content -Path $updateDataPath -Encoding UTF8)
          if ($lines.Count -eq 0) {
            $lines = @("")
          }
          $lines[$lines.Count - 1] = $version
          $updateDataContent = ($lines -join "`n") + "`n"
          Set-Content -Path $updateDataPath -Value $updateDataContent -Encoding UTF8

          Write-Host "Updated version in PerfectBuild/perfect_build.py and update_data.txt"

      - name: Build (Nuitka mode)
        if: ${{ env.IS_TAG == 'true' || env.IS_MAIN != 'true' || steps.nuitka_cache.outputs.cache-hit != 'true' }}
        shell: powershell
        env:
          SAA_APP_DIR: ${{ github.workspace }}
          INNO_SETUP_COMPILER: C:\Program Files (x86)\Inno Setup 6\ISCC.exe
        run: |
          Write-Host "Starting Nuitka build..."
          python .\PerfectBuild\build.py --n
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed"
            exit 1
          }

      - name: Analyze package size
        if: ${{ env.IS_TAG == 'true' }}
        shell: powershell
        run: |
          $appExec = "SAA"
          $distDir = Join-Path "build\Windows-64" "$appExec.dist"
          if (-not (Test-Path $distDir)) {
            Write-Warning "Dist directory not found: $distDir"
            Get-ChildItem build -Recurse -ErrorAction SilentlyContinue | Select-Object -First 100
            exit 0
          }

          Write-Host "=== Top 30 largest files in dist ==="
          Get-ChildItem $distDir -Recurse -File |
            Sort-Object Length -Descending |
            Select-Object -First 30 @{Name='SizeMB';Expression={[math]::Round($_.Length/1MB,2)}}, FullName |
            Format-Table -AutoSize

          Write-Host "=== Top 20 largest top-level entries in dist ==="
          Get-ChildItem $distDir | ForEach-Object {
            if ($_.PSIsContainer) {
              $size = (Get-ChildItem $_.FullName -Recurse -File -ErrorAction SilentlyContinue | Measure-Object Length -Sum).Sum
            } else {
              $size = $_.Length
            }
            [PSCustomObject]@{ Name = $_.Name; SizeMB = [math]::Round($size/1MB,2) }
          } | Sort-Object SizeMB -Descending | Select-Object -First 20 | Format-Table -AutoSize

      - name: Verify release output
        id: verify
        if: ${{ env.IS_TAG == 'true' }}
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseDir = Join-Path "release" "$version-n"

          if (-not (Test-Path $releaseDir)) {
            Write-Error "未找到 release 目录: $releaseDir"
            Get-ChildItem release -ErrorAction SilentlyContinue
            exit 1
          }

          $exeFiles = Get-ChildItem $releaseDir -Recurse -Filter *.exe
          if (-not $exeFiles) {
            Write-Error "release 目录中未找到 exe: $releaseDir"
            Get-ChildItem $releaseDir -Recurse
            exit 1
          }

          Write-Host "找到以下 exe 文件："
          $exeFiles | ForEach-Object { Write-Host " - $($_.FullName)" }

          "release_dir=$releaseDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Collect release files
        id: collect
        if: ${{ env.IS_TAG == 'true' }}
        shell: powershell
        run: |
          $releaseDir = "${{ steps.verify.outputs.release_dir }}"
          $outDir = "release_upload"
          if (Test-Path $outDir) { Remove-Item $outDir -Recurse -Force }
          New-Item -ItemType Directory -Path $outDir | Out-Null

          Copy-Item -Path (Join-Path $releaseDir "*.zip") -Destination $outDir -ErrorAction SilentlyContinue
          Copy-Item -Path (Join-Path $releaseDir "*.exe") -Destination $outDir -ErrorAction SilentlyContinue

          $files = Get-ChildItem $outDir -File -ErrorAction SilentlyContinue
          if (-not $files) {
            Write-Error "No release files (*.zip/*.exe) found in $releaseDir"
            Get-ChildItem $releaseDir -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

          Write-Host "Release files to upload:"
          $files | ForEach-Object { Write-Host " - $($_.Name)" }

          "release_files_dir=$outDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload portable zip artifact
        if: ${{ env.IS_TAG == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: SaaAutomataAcacia-${{ steps.version.outputs.version }}-portable
          path: ${{ steps.collect.outputs.release_files_dir }}/*.zip
          if-no-files-found: error

      - name: Upload installer exe artifact
        if: ${{ env.IS_TAG == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: SaaAutomataAcacia-${{ steps.version.outputs.version }}-installer
          path: ${{ steps.collect.outputs.release_files_dir }}/*.exe
          if-no-files-found: error

      - name: Create draft GitHub Release
        if: ${{ env.IS_TAG == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SaaAutomataAcacia ${{ steps.version.outputs.version }}
          draft: true
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            ${{ steps.collect.outputs.release_files_dir }}/*.exe
            ${{ steps.collect.outputs.release_files_dir }}/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
