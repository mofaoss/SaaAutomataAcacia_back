name: 构建 SaaAutomataAcacia Windows 安装包

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '可选：手动指定版本号（例如 2.3.2），不填则自动取 tag 或 perfect_build.py 当前版本'
        required: false
        type: string

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      PYTHON_VERSION: '3.10'
      CONDA_ENV_NAME: saa-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MSVC build environment (C compiler for Nuitka)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Verify C compiler
        shell: powershell
        run: |
          $cl = Get-Command cl.exe -ErrorAction SilentlyContinue
          if (-not $cl) {
            Write-Error "未找到 cl.exe（MSVC C 编译器），Nuitka 无法继续"
            exit 1
          }
          Write-Host "MSVC compiler found: $($cl.Source)"

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PYTHON_VERSION }}
          activate-environment: ${{ env.CONDA_ENV_NAME }}
          auto-activate-base: false
          channels: conda-forge
          channel-priority: strict

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $compil32 = "C:\Program Files (x86)\Inno Setup 6\Compil32.exe"
          if ((-not (Test-Path $iscc)) -and (-not (Test-Path $compil32))) {
            Write-Error "Inno Setup 安装失败，未找到 ISCC.exe/Compil32.exe"
            exit 1
          }

      - name: Install Python dependencies
        shell: powershell
        run: |
          conda run -n $env:CONDA_ENV_NAME python -m pip install --upgrade pip setuptools wheel
          conda run -n $env:CONDA_ENV_NAME pip install -r requirements.txt

          # 提前安装常见漏装依赖，减少 build.py 中断概率
          conda run -n $env:CONDA_ENV_NAME pip install nuitka scons ordered-set zstandard pefile imageio pywin32

      - name: Resolve version from tag/input
        id: version
        shell: powershell
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          $refName = "${{ github.ref_name }}"

          if ($inputVersion) {
            $version = $inputVersion
          } elseif ("${{ github.ref }}" -like "refs/tags/*") {
            $version = $refName -replace '^v', ''
          } else {
            $version = ""
          }

          if (-not $version) {
            $content = Get-Content "PerfectBuild/perfect_build.py" -Raw
            if ($content -match 'app_ver\s*=\s*"([^"]+)"') {
              $version = $Matches[1]
            } else {
              Write-Error "无法从 perfect_build.py 解析 app_ver"
              exit 1
            }
          }

          Write-Host "Build version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Update version in files
        shell: powershell
        env:
          TARGET_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $version = $env:TARGET_VERSION

          conda run -n $env:CONDA_ENV_NAME python -c "from pathlib import Path; import os, re; v=os.environ['TARGET_VERSION']; p=Path('PerfectBuild/perfect_build.py'); t=p.read_text(encoding='utf-8'); t_new=re.sub(r'app_ver\s*=\s*\"[^\"]+\"', f'app_ver = \"{v}\"', t, count=1); p.write_text(t_new, encoding='utf-8')"

          conda run -n $env:CONDA_ENV_NAME python -c "from pathlib import Path; import os; v=os.environ['TARGET_VERSION']; p=Path('update_data.txt'); lines=p.read_text(encoding='utf-8').splitlines(); lines = lines if lines else ['']; lines[-1]=v; p.write_text('\\n'.join(lines)+'\\n', encoding='utf-8')"

          Write-Host "已更新版本号到 PerfectBuild/perfect_build.py 和 update_data.txt"

      - name: Build with retry (Nuitka mode)
        shell: powershell
        env:
          SAA_APP_DIR: ${{ github.workspace }}
          INNO_SETUP_COMPILER: C:\Program Files (x86)\Inno Setup 6\ISCC.exe
        run: |
          $maxRetries = 3
          $success = $false

          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
            Write-Host "===== Build attempt $attempt/$maxRetries ====="
            conda run -n $env:CONDA_ENV_NAME python .\PerfectBuild\build.py --n

            if ($LASTEXITCODE -eq 0) {
              $success = $true
              break
            }

            if ($attempt -lt $maxRetries) {
              Write-Warning "构建失败，准备补装依赖后重试..."
              conda run -n $env:CONDA_ENV_NAME pip install --upgrade nuitka ordered-set zstandard pyinstaller
              Start-Sleep -Seconds 20
            }
          }

          if (-not $success) {
            Write-Error "构建在 $maxRetries 次尝试后仍失败"
            exit 1
          }

      - name: Verify release output
        id: verify
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseDir = Join-Path "release" "$version-n"

          if (-not (Test-Path $releaseDir)) {
            Write-Error "未找到 release 目录: $releaseDir"
            Get-ChildItem release -ErrorAction SilentlyContinue
            exit 1
          }

          $exeFiles = Get-ChildItem $releaseDir -Recurse -Filter *.exe
          if (-not $exeFiles) {
            Write-Error "release 目录中未找到 exe: $releaseDir"
            Get-ChildItem $releaseDir -Recurse
            exit 1
          }

          Write-Host "找到以下 exe 文件："
          $exeFiles | ForEach-Object { Write-Host " - $($_.FullName)" }

          "release_dir=$releaseDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SaaAutomataAcacia-${{ steps.version.outputs.version }}-windows
          path: ${{ steps.verify.outputs.release_dir }}/**
          if-no-files-found: error
